<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #0E1116; overflow: hidden;
    font-family: Inter, sans-serif;
  }

  /* Lower-third group anchored in the lower-left safe area.
     Bottom edge of the text block sits so the name baseline lands ~y=940. */
  #lt {
    position: absolute;
    left: 120px;
    top: 818px;            /* block top; name baseline ends up ≈ 940 */
    display: flex;
    align-items: stretch;
  }

  /* Accent bar: clipped wrapper so the bar can wipe in vertically */
  #bar-wrap {
    width: 10px;
    margin-right: 28px;
    overflow: hidden;
    position: relative;
  }
  #bar {
    position: absolute;
    left: 0; bottom: 0;
    width: 10px; height: 100%;
    background: #00C2A8;
    border-radius: 2px;
  }

  #text {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Each line gets its own clip wrapper for a clean masked entrance */
  .line-mask { overflow: hidden; }

  #name {
    color: #FFFFFF;
    font-size: 72px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.5px;
    white-space: nowrap;
    opacity: 0;
  }
  #role {
    color: #A8B0BD;
    font-size: 34px;
    font-weight: 400;
    line-height: 1.3;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    white-space: nowrap;
    margin-top: 8px;
    opacity: 0;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="lt">
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="text">
      <div class="line-mask"><div id="name">Dr. Maya Chen</div></div>
      <div class="line-mask"><div id="role">Climate Scientist, NOAA</div></div>
    </div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // Timeline: 0.0–0.4 hold, 0.4–1.2 enter, hold to 4.2, 4.2–5.0 exit.
  const tl = gsap.timeline();

  // Initial states
  gsap.set("#lt",   { x: -36 });
  gsap.set("#bar",  { scaleY: 0, transformOrigin: "50% 100%" });
  gsap.set("#name", { x: -56, opacity: 0 });
  gsap.set("#role", { x: -44, opacity: 0 });

  // --- ENTER (0.4s – 1.2s) ---
  // Whole group eases in from the left while elements cascade.
  tl.to("#lt", { x: 0, duration: 0.8, ease: "power3.out" }, 0.4);

  // Accent bar leads: vertical wipe up.
  tl.to("#bar", { scaleY: 1, duration: 0.45, ease: "power3.out" }, 0.4);

  // Name follows.
  tl.to("#name", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 0.52);

  // Role last.
  tl.to("#role", { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 0.65);

  // --- HOLD until 4.2s ---

  // --- EXIT (4.2s – 5.0s) ---
  tl.to("#role", { x: -36, opacity: 0, duration: 0.45, ease: "power2.in" }, 4.20);
  tl.to("#name", { x: -44, opacity: 0, duration: 0.50, ease: "power2.in" }, 4.26);
  tl.to("#bar",  { scaleY: 0, transformOrigin: "50% 0%", duration: 0.40, ease: "power2.in" }, 4.34);
  tl.to("#lt",   { x: -28, duration: 0.6, ease: "power2.in" }, 4.20);
</script>
</body>
</html>
