<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #0E1116; overflow: hidden;
    font-family: Inter, sans-serif;
  }

  /* Lower-third block anchored to the lower-left safe area.
     Baseline of the name sits near y = 940. */
  #lower-third {
    position: absolute;
    left: 120px;
    top: 838px;            /* block top; name baseline lands ~y=940 */
    display: flex;
    align-items: stretch;
  }

  #accent {
    width: 10px;
    background: #00C2A8;
    border-radius: 2px;
    margin-right: 30px;
    opacity: 0;
    transform-origin: 50% 50%;
  }

  #text-block {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #name {
    color: #FFFFFF;
    font-size: 76px;
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.5px;
    opacity: 0;
    white-space: nowrap;
  }

  #role {
    color: #A8B0BD;
    font-size: 34px;
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 18px;
    opacity: 0;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="lower-third">
    <div id="accent"></div>
    <div id="text-block">
      <div id="name">Dr. Maya Chen</div>
      <div id="role">Climate Scientist, NOAA</div>
    </div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // Total duration: 5.0 s @ 30 fps.
  // 0.0–0.4  hold (empty frame)
  // 0.4–1.2  enter: accent leads, then name, then role
  // 1.2–4.2  hold fully visible
  // 4.2–5.0  exit: fade + slight slide back left, accelerating ease

  const tl = gsap.timeline();

  // --- Entrance (starts at 0.4 s) ---
  // Accent bar leads: slides in from the left while growing vertically.
  tl.fromTo("#accent",
    { x: -60, opacity: 0, scaleY: 0.2 },
    { x: 0, opacity: 1, scaleY: 1, duration: 0.45, ease: "power3.out" },
    0.4);

  // Name follows with a slight delay.
  tl.fromTo("#name",
    { x: -70, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" },
    0.52);

  // Role last.
  tl.fromTo("#role",
    { x: -70, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.55, ease: "power3.out" },
    0.65);
  // Entrance fully settled by 1.2 s.

  // --- Hold until 4.2 s, then exit by 5.0 s ---
  // Role leaves first, then name, then the accent bar — mirroring the entrance.
  tl.to("#role",
    { x: -50, opacity: 0, duration: 0.5, ease: "power2.in" },
    4.2);

  tl.to("#name",
    { x: -50, opacity: 0, duration: 0.5, ease: "power2.in" },
    4.28);

  tl.to("#accent",
    { x: -50, opacity: 0, scaleY: 0.3, duration: 0.5, ease: "power2.in" },
    4.38);
  // Exit complete at 4.88 s; short clean hold to 5.0 s.
</script>
</body>
</html>
