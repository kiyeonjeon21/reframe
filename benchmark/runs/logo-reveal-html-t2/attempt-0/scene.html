<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }

  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    background: #08090B;
    overflow: hidden;
    font-family: Inter, sans-serif;
  }

  /* Whole lockup fills the stage; flex keeps composition centered,
     so scaling #lockup pivots around the canvas center. */
  #lockup {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ---- Mark ---- */
  #markFloat {
    position: relative;
    width: 260px;
    height: 260px;
    margin-bottom: 58px;
  }

  #mark {
    position: absolute;
    inset: 0;
  }

  /* Soft ambient glow behind the mark */
  #glow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 560px;
    height: 560px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(124, 92, 255, 0.28) 0%,
      rgba(124, 92, 255, 0.10) 38%,
      rgba(124, 92, 255, 0.0) 68%);
    opacity: 0;
  }

  /* Primary ring */
  #ring {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 216px;
    height: 216px;
    border: 16px solid #7C5CFF;
    border-radius: 50%;
    box-shadow:
      0 0 44px rgba(124, 92, 255, 0.35),
      inset 0 0 22px rgba(124, 92, 255, 0.25);
    opacity: 0;
  }

  /* Thin orbit accent ring */
  #orbit {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 258px;
    height: 258px;
    border: 2px solid rgba(124, 92, 255, 0.45);
    border-radius: 50%;
    opacity: 0;
  }

  /* Inner four-point spark (the "nova") */
  #spark {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 104px;
    height: 104px;
    background: #F5F3FF;
    clip-path: polygon(
      50% 0%, 61% 39%, 100% 50%, 61% 61%,
      50% 100%, 39% 61%, 0% 50%, 39% 39%);
    filter: drop-shadow(0 0 18px rgba(245, 243, 255, 0.55));
    opacity: 0;
  }

  /* ---- Type ---- */
  #wordmark {
    color: #FFFFFF;
    font-size: 132px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 30px;
    padding-left: 30px; /* balances trailing letter-spacing for true centering */
    opacity: 0;
  }

  #tagline {
    margin-top: 30px;
    color: #8A8D98;
    font-size: 30px;
    font-weight: 400;
    letter-spacing: 11px;
    padding-left: 11px;
    text-transform: lowercase;
    opacity: 0;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="lockup">
    <div id="markFloat">
      <div id="mark">
        <div id="glow"></div>
        <div id="orbit"></div>
        <div id="ring"></div>
        <div id="spark"></div>
      </div>
    </div>
    <div id="wordmark">NOVA</div>
    <div id="tagline">light the way</div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // Total duration: 5.0s @ 30fps, 1920x1080.
  const C = { xPercent: -50, yPercent: -50 };
  const tl = gsap.timeline();

  /* ---- 1. Mark assembly: 0.0 - 1.2s (overlapping parts) ---- */

  // Ambient glow blooms first.
  tl.fromTo("#glow",
    { ...C, scale: 0.55, opacity: 0 },
    { ...C, scale: 1, opacity: 1, duration: 0.9, ease: "power2.out" }, 0);

  // Primary ring scales in while its rotation settles to 0.
  tl.fromTo("#ring",
    { ...C, scale: 0.25, rotation: -140, opacity: 0 },
    { ...C, scale: 1, rotation: 0, opacity: 1, duration: 0.85, ease: "expo.out" }, 0.05);

  // Thin orbit ring sweeps in slightly behind, counter-rotating.
  tl.fromTo("#orbit",
    { ...C, scale: 1.5, rotation: 100, opacity: 0 },
    { ...C, scale: 1, rotation: 0, opacity: 1, duration: 0.8, ease: "power3.out" }, 0.22);

  // Inner spark pops with overshoot, spinning into alignment.
  tl.fromTo("#spark",
    { ...C, scale: 0, rotation: 120, opacity: 0 },
    { ...C, scale: 1, rotation: 0, opacity: 1, duration: 0.75, ease: "back.out(1.6)" }, 0.4);

  /* ---- 2. Wordmark 1.0 - 1.8s, tagline ~0.2s later ---- */

  // Wordmark rises from below while fading in; tracking tightens as it lands.
  tl.fromTo("#wordmark",
    { y: 56, opacity: 0, letterSpacing: "46px", paddingLeft: "46px" },
    { y: 0, opacity: 1, letterSpacing: "30px", paddingLeft: "30px",
      duration: 0.8, ease: "power3.out" }, 1.0);

  // Tagline follows.
  tl.fromTo("#tagline",
    { y: 30, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 1.2);

  /* ---- 3. Hold until 4.2s: mark floats subtly ---- */

  // Slow, small-amplitude vertical float on the mark wrapper
  // (separate element so it never fights the assembly transforms).
  gsap.to("#markFloat", {
    y: -9, duration: 1.5, delay: 1.3,
    yoyo: true, repeat: -1, ease: "sine.inOut"
  });

  // The spark breathes faintly with the float.
  gsap.to("#spark", {
    scale: 1.06, duration: 1.5, delay: 1.45,
    yoyo: true, repeat: -1, ease: "sine.inOut",
    overwrite: false
  });

  /* ---- 4. 4.2 - 5.0s: lockup scales up slightly and fades out ---- */

  tl.to("#lockup", { scale: 1.07, duration: 0.8, ease: "power1.inOut" }, 4.2);
  tl.to("#lockup", { opacity: 0, duration: 0.7, ease: "power2.in" }, 4.25);
</script>
</body>
</html>
