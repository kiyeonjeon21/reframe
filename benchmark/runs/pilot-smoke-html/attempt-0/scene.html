<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #15151A; overflow: hidden;
    font-family: Inter, sans-serif;
  }
  #badge {
    position: absolute; left: 960px; top: 540px;
    width: 420px; height: 160px; margin: -80px 0 0 -210px;
    background: #E11D48; border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0);
  }
  #badge span {
    color: #fff; font-size: 88px; font-weight: 800; letter-spacing: 6px;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="badge"><span>NEW</span></div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // "NEW" badge: overshoot pop, gentle tilt wiggle while it hangs, drop away.
  const tl = gsap.timeline({ delay: 0.2 });
  tl.to("#badge", { opacity: 1, duration: 0.15, ease: "power1.out" })
    .to("#badge", { scale: 1.18, duration: 0.28, ease: "power2.out" }, "<")
    .to("#badge", { scale: 1, duration: 0.18, ease: "power1.inOut" })
    .to("#badge", { y: 180, opacity: 0, duration: 0.35, ease: "power2.in" }, "+=1.6");

  // Continuous wiggle layered on top (separate tween, repeats forever).
  gsap.to("#badge", {
    rotation: 2.5,
    duration: 0.625,
    yoyo: true,
    repeat: -1,
    ease: "sine.inOut",
  });
</script>
</body>
</html>
