<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #0B0E14; overflow: hidden;
    font-family: Inter, sans-serif;
  }
  #scene { position: absolute; inset: 0; }

  /* ---- Title ---- */
  #title {
    position: absolute; left: 435px; top: 130px;
    font-size: 64px; font-weight: 800; color: #FFFFFF;
    letter-spacing: 0.5px; opacity: 0;
  }
  #subtitle {
    position: absolute; left: 438px; top: 215px;
    font-size: 26px; font-weight: 400; color: #6B7484;
    letter-spacing: 2.5px; text-transform: uppercase; opacity: 0;
  }

  /* ---- Gridlines ---- */
  .grid {
    position: absolute; left: 385px; width: 1150px; height: 1px;
    background: #1C212C; opacity: 0;
  }
  .grid-label {
    position: absolute; left: 340px; width: 36px; text-align: right;
    font-size: 22px; font-weight: 400; color: #4A5263;
    transform: translateY(-50%); opacity: 0;
  }

  /* ---- Axis baseline ---- */
  #axis {
    position: absolute; left: 385px; bottom: 199px; width: 1150px;
    height: 2px; background: #3A4150; opacity: 0;
    transform-origin: left center;
  }

  /* ---- Bars ---- */
  .bar {
    position: absolute; bottom: 201px; width: 180px; height: 0;
    background: linear-gradient(180deg, #6E9AFF 0%, #5B8CFF 55%, #4C7BF0 100%);
    border-radius: 10px 10px 0 0;
    transform: translateX(-50%);
  }
  .value {
    position: absolute; bottom: 219px; transform: translateX(-50%);
    font-size: 42px; font-weight: 700; color: #FFFFFF;
    font-variant-numeric: tabular-nums; opacity: 0;
    text-align: center; width: 180px;
  }
  .qlabel {
    position: absolute; bottom: 142px; transform: translateX(-50%);
    font-size: 30px; font-weight: 700; color: #8A93A6;
    letter-spacing: 1.5px; opacity: 0;
    text-align: center; width: 180px;
  }

  .bx1 { left: 525px; }
  .bx2 { left: 815px; }
  .bx3 { left: 1105px; }
  .bx4 { left: 1395px; }
</style>
</head>
<body>
<div id="stage">
  <div id="scene">
    <div id="title">2025 Revenue ($M)</div>
    <div id="subtitle">Quarterly Performance</div>

    <!-- gridlines: scale 40px per $1M, baseline at y=880 (bottom:200) -->
    <div class="grid"       style="bottom: 359px;"></div>
    <div class="grid-label" style="bottom: 347px;">4</div>
    <div class="grid"       style="bottom: 519px;"></div>
    <div class="grid-label" style="bottom: 507px;">8</div>
    <div class="grid"       style="bottom: 679px;"></div>
    <div class="grid-label" style="bottom: 667px;">12</div>
    <div class="grid"       style="bottom: 839px;"></div>
    <div class="grid-label" style="bottom: 827px;">16</div>

    <div id="axis"></div>

    <div class="bar bx1" id="bar-1"></div>
    <div class="bar bx2" id="bar-2"></div>
    <div class="bar bx3" id="bar-3"></div>
    <div class="bar bx4" id="bar-4"></div>

    <div class="value bx1" id="val-1">0.0</div>
    <div class="value bx2" id="val-2">0.0</div>
    <div class="value bx3" id="val-3">0.0</div>
    <div class="value bx4" id="val-4">0.0</div>

    <div class="qlabel bx1" id="q-1">Q1</div>
    <div class="qlabel bx2" id="q-2">Q2</div>
    <div class="qlabel bx3" id="q-3">Q3</div>
    <div class="qlabel bx4" id="q-4">Q4</div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // Data: $M values, 40px per unit
  const data = [8.2, 9.1, 11.4, 14.0];
  const PX_PER_UNIT = 40;

  const tl = gsap.timeline();

  // 1) 0.0–0.5s: title (and chart frame) fade in
  tl.fromTo("#title", { opacity: 0, y: 24 },
    { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0);
  tl.fromTo("#subtitle", { opacity: 0, y: 18 },
    { opacity: 0.95, y: 0, duration: 0.5, ease: "power2.out" }, 0.08);
  tl.fromTo("#axis", { opacity: 0, scaleX: 0 },
    { opacity: 1, scaleX: 1, duration: 0.55, ease: "power3.out" }, 0.1);
  tl.to(".grid", { opacity: 1, duration: 0.45, ease: "power1.out", stagger: 0.05 }, 0.15);
  tl.to(".grid-label", { opacity: 1, duration: 0.45, ease: "power1.out", stagger: 0.05 }, 0.15);

  // 2) 0.5–2.5s: bars grow with 0.15s stagger; values count up and ride bar tops
  const GROW = 1.3;          // each bar's growth duration
  const STAGGER = 0.15;
  const EASE = "power3.out"; // decelerating

  data.forEach((v, i) => {
    const n = i + 1;
    const h = v * PX_PER_UNIT;
    const start = 0.5 + i * STAGGER;
    const counter = { value: 0 };
    const valEl = document.getElementById(`val-${n}`);

    // bar grows up from baseline
    tl.fromTo(`#bar-${n}`, { height: 0 },
      { height: h, duration: GROW, ease: EASE }, start);

    // value label rides just above the bar top while counting up
    tl.fromTo(`#val-${n}`, { y: 0, opacity: 0 },
      { y: -h, opacity: 1, duration: GROW, ease: EASE,
        onUpdate: () => { valEl.textContent = counter.value.toFixed(1); } }, start);
    tl.to(counter, { value: v, duration: GROW, ease: EASE }, start);

    // 3) quarter label fades in with its bar
    tl.fromTo(`#q-${n}`, { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, start + 0.1);
  });

  // 4) hold until 5.2s, then 5) 5.2–6.0s: everything fades out together
  tl.to("#scene", { opacity: 0, duration: 0.8, ease: "power2.inOut" }, 5.2);
</script>
</body>
</html>
