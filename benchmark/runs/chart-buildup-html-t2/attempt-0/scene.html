<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #0B0E14; overflow: hidden;
    font-family: Inter, sans-serif;
  }
  #scene { position: absolute; inset: 0; }

  /* ---- Title ---- */
  #title {
    position: absolute; left: 435px; top: 132px;
    color: #FFFFFF; font-size: 64px; font-weight: 800;
    letter-spacing: 0.5px; opacity: 0;
  }
  #title-accent {
    position: absolute; left: 435px; top: 218px;
    width: 76px; height: 6px; border-radius: 3px;
    background: #5B8CFF; opacity: 0;
  }

  /* ---- Chart geometry ----
     Chart area: x 435..1485 (1050px wide), baseline at y = 860 (bottom: 220).
     Bars: 180px wide, 110px gaps. Scale: 40px per $1M (14.0 -> 560px). */
  .bar {
    position: absolute; bottom: 220px; width: 180px; height: 0;
    background: #5B8CFF; border-radius: 10px 10px 0 0;
  }
  #axis {
    position: absolute; left: 405px; bottom: 218px;
    width: 1110px; height: 2px; background: #3A4150;
  }
  .qlabel {
    position: absolute; top: 886px; width: 180px;
    text-align: center; color: #8A93A6;
    font-size: 36px; font-weight: 700; letter-spacing: 2px;
    opacity: 0;
  }
  .vlabel {
    position: absolute; bottom: 234px; width: 180px;
    text-align: center; color: #FFFFFF;
    font-size: 44px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    opacity: 0;
  }

  /* column x positions */
  .c0 { left: 435px; }
  .c1 { left: 725px; }
  .c2 { left: 1015px; }
  .c3 { left: 1305px; }
</style>
</head>
<body>
<div id="stage">
  <div id="scene">
    <div id="title">2025 Revenue ($M)</div>
    <div id="title-accent"></div>

    <div id="axis"></div>

    <div class="bar c0" id="bar-0"></div>
    <div class="bar c1" id="bar-1"></div>
    <div class="bar c2" id="bar-2"></div>
    <div class="bar c3" id="bar-3"></div>

    <div class="vlabel c0" id="val-0">0.0</div>
    <div class="vlabel c1" id="val-1">0.0</div>
    <div class="vlabel c2" id="val-2">0.0</div>
    <div class="vlabel c3" id="val-3">0.0</div>

    <div class="qlabel c0" id="q-0">Q1</div>
    <div class="qlabel c1" id="q-1">Q2</div>
    <div class="qlabel c2" id="q-2">Q3</div>
    <div class="qlabel c3" id="q-3">Q4</div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  const DATA = [8.2, 9.1, 11.4, 14.0];
  const PX_PER_M = 40;            // 14.0 -> 560px tall
  const BASE_BOTTOM = 220;        // baseline y (from stage bottom)
  const LABEL_GAP = 16;           // value label rides this far above bar top

  const tl = gsap.timeline();

  // 1. Title fades in (0.0 - 0.5s)
  tl.fromTo("#title",
    { opacity: 0, y: 24 },
    { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0)
    .fromTo("#title-accent",
    { opacity: 0, scaleX: 0, transformOrigin: "left center" },
    { opacity: 1, scaleX: 1, duration: 0.5, ease: "power2.out" }, 0.08);

  // 2 & 3. Bars grow with count-up labels; quarter labels fade in with bars
  const GROW = 1.1;
  DATA.forEach((value, i) => {
    const start = 0.5 + i * 0.15;
    const h = value * PX_PER_M;
    const counter = { v: 0 };
    const valEl = document.getElementById("val-" + i);

    // bar grows up from the baseline
    tl.fromTo("#bar-" + i,
      { height: 0 },
      { height: h, duration: GROW, ease: "power3.out" }, start);

    // value label rides just above the bar top (same ease, stays in sync)
    tl.fromTo("#val-" + i,
      { bottom: BASE_BOTTOM + LABEL_GAP, opacity: 0 },
      { bottom: BASE_BOTTOM + h + LABEL_GAP, opacity: 1,
        duration: GROW, ease: "power3.out" }, start);

    // count up 0 -> value with the same ease as the bar height
    tl.to(counter,
      { v: value, duration: GROW, ease: "power3.out",
        onUpdate: () => { valEl.textContent = counter.v.toFixed(1); } }, start);

    // quarter label fades in with its bar
    tl.fromTo("#q-" + i,
      { opacity: 0, y: 12 },
      { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, start + 0.05);
  });

  // 4. Hold until 5.2s, then 5. everything fades out together (5.2 - 6.0s)
  tl.to("#scene", { opacity: 0, duration: 0.8, ease: "power2.inOut" }, 5.2);
</script>
</body>
</html>
