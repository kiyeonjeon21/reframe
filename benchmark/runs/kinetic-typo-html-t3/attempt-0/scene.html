<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    background: #0D0D0F; overflow: hidden;
    font-family: Inter, sans-serif;
  }
  #block {
    position: absolute; left: 0; top: 0; width: 1920px; height: 1080px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    row-gap: 14px;
  }
  .word {
    opacity: 0;
    transform: scale(0.4);
    will-change: transform, opacity;
  }
  .word .inner {
    display: block;
    font-weight: 800;
    text-transform: uppercase;
    color: #FFFFFF;
    font-size: 148px;
    line-height: 0.92;
    letter-spacing: 0.04em;
  }
  #w-nothing .inner {
    font-size: 224px;
    color: #FFC400;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="block">
    <div class="word" id="w-ship"><span class="inner">SHIP</span></div>
    <div class="word" id="w-fast"><span class="inner">FAST</span></div>
    <div class="word" id="w-break"><span class="inner">BREAK</span></div>
    <div class="word" id="w-nothing"><span class="inner">NOTHING</span></div>
  </div>
</div>
<script src="./gsap.min.js"></script>
<script>
  // Timing plan (total 5.0s):
  //   0.40  SHIP punches in
  //   0.65  FAST
  //   0.90  BREAK
  //   1.15  NOTHING (lands ~1.55)
  //   hold with subtle pulse on NOTHING
  //   4.35 -> 4.95  fast horizontal exits, alternating directions
  const words = ["#w-ship", "#w-fast", "#w-break", "#w-nothing"];

  const tl = gsap.timeline();

  // --- 1. Punch-in, one word at a time, 0.25s apart ---
  words.forEach((sel, i) => {
    const t = 0.40 + i * 0.25;
    tl.fromTo(sel,
      { opacity: 0, scale: 0.4 },
      { opacity: 1, scale: 1.07, duration: 0.22, ease: "power3.out" }, t)
      .to(sel, { scale: 1, duration: 0.14, ease: "power2.inOut" }, t + 0.22);
  });

  // --- 2. Hold: subtle continuous pulse on NOTHING (inner span, so it
  //         never fights the pop/exit transforms on the line itself) ---
  tl.to("#w-nothing .inner", {
    scale: 1.035, duration: 0.55, ease: "sine.inOut",
    yoyo: true, repeat: -1, transformOrigin: "50% 50%"
  }, 1.55);

  // --- 3. Exit: fly out horizontally, alternating directions, fast ---
  const EXIT = 4.35;
  const dirs = [-1, 1, -1, 1]; // SHIP left, FAST right, BREAK left, NOTHING right
  words.forEach((sel, i) => {
    tl.to(sel, {
      x: dirs[i] * 1500,
      opacity: 0,
      duration: 0.55,
      ease: "power3.in"
    }, EXIT + i * 0.02);
  });
</script>
</body>
</html>
