name: Publish

# Publish runs ONLY on request, never on a normal push (CI handles those).
# Two ways to request a release, both using the NPM_TOKEN repo secret:
#   - Actions tab -> "Publish" -> Run workflow (manual), or
#   - push a version tag: `git tag v0.1.2 && git push origin v0.1.2`.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release on a tag push
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Build the publishable package
        run: pnpm --filter reframe-video build
      - name: Guard — tag must match package version
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION="v$(node -p "require('./packages/reframe-video/package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG package=$PKG_VERSION"
          test "$TAG" = "$PKG_VERSION" || { echo "::error::tag $TAG != package $PKG_VERSION"; exit 1; }
      - name: Publish to npm
        run: npm publish
        working-directory: packages/reframe-video
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Only on a tag push (a real release), and only after npm publish succeeds.
      # Notes are the CHANGELOG section for this version; the title gets the first
      # "#### <theme>" heading as a subtitle when present. Idempotent (skips if the
      # release already exists, so re-runs don't fail).
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > /tmp/notes.md
          [ -s /tmp/notes.md ] || echo "See CHANGELOG.md." > /tmp/notes.md
          THEME=$(grep -m1 '^#### ' /tmp/notes.md | sed 's/^#### //')
          TITLE="$GITHUB_REF_NAME"
          [ -n "$THEME" ] && TITLE="$GITHUB_REF_NAME — $THEME"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists, skipping"
          else
            gh release create "$GITHUB_REF_NAME" --title "$TITLE" --notes-file /tmp/notes.md
          fi
