name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macOS (ARM) matches the platform the golden snapshots were authored on;
    # transcendental floats (eases) differ by a last ULP across CPUs/libm, so
    # byte-exact goldens are only portable on the same platform family.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Install ffmpeg
        run: brew install ffmpeg
      - name: Install Playwright Chromium
        run: pnpm --filter @reframe/render-cli exec playwright install chromium
      - run: pnpm test
