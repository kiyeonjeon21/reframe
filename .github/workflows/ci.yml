name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Playwright Chromium
        run: pnpm --filter @reframe/render-cli exec playwright install --with-deps chromium
      # Byte-exact DisplayList snapshots are skipped in CI (platform-fragile last
      # ULP); the round-trip determinism + the mp4-byte determinism test still run.
      - run: pnpm test
